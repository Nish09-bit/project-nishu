<!DOCTYPE html>
<html>
<head>
    <title>Login - FreshHire</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body style="background: linear-gradient(135deg, #16a34a, #15803d); min-height:100vh; display:flex; align-items:center; justify-content:center;">

<div class="form-container" style="width:420px;">
    <div style="text-align:center; margin-bottom:25px;">
        <span style="font-size:40px;">🚀</span>
        <h2 style="margin-top:10px;">Welcome Back!</h2>
        <p style="color:#888; font-size:14px;">Login to your FreshHire account</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="/login">
        <input type="email" name="email" placeholder="📧  Email Address" required>
        <input type="password" name="password" placeholder="🔒  Password" required>
        <button type="submit">Login →</button>
    </form>

    <p style="text-align:center; margin-top:20px; color:#555;">
        Don't have an account? <a href="/signup">Sign Up Free</a>
    </p>
    <p style="text-align:center; margin-top:5px;">
        <a href="/" style="color:#aaa; font-size:13px;">← Back to Home</a>
    </p>
</div>

</body>
</html>
